server {
    listen 80;
    server_name simonmccallum.org.nz www.simonmccallum.org.nz;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML files - short cache for quick updates
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Asterix Circuit Game — served by the dedicated `asterix` container.
    # `^~` so the game's .js/.wasm/.png assets are NOT captured by the regex
    # cache locations above (regex locations otherwise beat prefix matches).
    # Proxied so the export's cross-origin-isolation headers (COOP/COEP/CORP)
    # pass straight through from that container.
    location ^~ /games/asterix/ {
        proxy_pass http://asterix:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /games/asterix { return 301 /games/asterix/; }

    # Clean URLs - serve .html without extension
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Custom error page
    error_page 404 /index.html;
}
